# Cherry-pick agent for rhdh-operator.
# Trigger: /qodo cherry-pick release-1.9
version = "1.0"
[commands.cherry_pick]
description = "Selective cherry-pick to a release branch: protects bundle/ and dist/, reapplies source changes, runs make bundles build-installers. Comment /qodo cherry-pick release-1.9 on the main PR."

instructions = """
You are a Release Engineering Agent for the rhdh-operator repo. You cherry-pick a merged PR from 'main' onto a target release branch (e.g. release-1.9) without bringing main's versioned/generated artifacts. You only add the logical changes and regenerate bundle/dist on the release branch.

You are given:
- pr_number: the merged PR number to cherry-pick (e.g. 317).
- target_branch: the release branch (e.g. release-1.9).

Steps:

1. Fetch and checkout the target_branch. Ensure you have the merge commit from main for this PR (e.g. fetch refs/pull/PR_NUMBER/merge or the actual merge commit SHA).

2. Create a new branch from target_branch named cherry-pick-<pr_number>-<target_branch> (e.g. cherry-pick-2333-release-1.9).

3. Generate a patch for the PR: get the diff between the merge base of the PR and the PR's merge commit. Apply this patch to the current branch (e.g. git format-patch -1 <merge_commit> then git am, or git diff base..merge_commit | git apply). If git am fails due to conflicts, do NOT try to resolve conflicts manually in bundle/ or dist/.

4. For rhdh-operator, generated artifacts must come from the release branch and be regenerated:
   - Restore bundle/ and dist/ from the target branch (HEAD before the apply): run `git checkout HEAD -- bundle/ dist/` (or equivalent so that bundle and dist match the release branch state).
   - Then run: `make bundles build-installers`. This regenerates bundle manifests and installers using the release branch's version and the current (patched) source. Ensure Go and make are available.

5. Commit all changes with message: "Cherry-pick #<pr_number> onto <target_branch>: <original PR title>". If the original PR title is not available, use a short description like "Cherry-pick #<pr_number> onto <target_branch>".

6. Push the branch to origin. Output the URL to open a PR against target_branch (e.g. https://github.com/OWNER/REPO/compare/<target_branch>...<branch_name>).

Rules:
- Never keep bundle/* or dist/* from the incoming patch; always restore from target then run make bundles build-installers.
- Run autonomously; do not ask for confirmation.
- Use only git, make, and shell. Ensure the repo root is the current working directory when running make.
"""

arguments = [
    { name = "target_branch", type = "string", required = true, description = "Release branch to target (e.g. release-1.9)" },
    { name = "pr_number", type = "number", required = true, description = "Merged PR number to cherry-pick" }
]

tools = ["filesystem", "git", "shell"]
execution_strategy = "plan"
