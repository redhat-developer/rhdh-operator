name: Sync Lightspeed Configs

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sync-lightspeed:
    name: Sync Lightspeed Configs
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: 'go.mod'

      - name: Set up yq
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: yq --version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync Lightspeed config files
        run: ./hack/sync-lightspeed-configs.sh

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet config/profile/rhdh/default-config/flavours/lightspeed/ examples/lightspeed.yaml; then
            echo "No changes from upstream."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected from upstream."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate manifests
        if: steps.changes.outputs.has_changes == 'true'
        run: make bundles build-installers

      - name: Commit changes and open PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="chore(lightspeed): sync config files from upstream"
          BRANCH="chore/sync-lightspeed-configs"

          EXISTING_PR=$(gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number // empty')

          git checkout -b "${BRANCH}"

          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi
          git commit -m "${TITLE}"

          if [ -n "${EXISTING_PR}" ]; then
            echo "Updating existing PR #${EXISTING_PR}."
            git push --force origin "${BRANCH}"
          else
            git push origin "${BRANCH}"

            BODY=$(cat <<EOF
          Automated nightly sync of Lightspeed config files from [redhat-ai-dev/lightspeed-configs](https://github.com/redhat-ai-dev/lightspeed-configs).

          ### Synced files
          - \`config/profile/rhdh/default-config/flavours/lightspeed/configmap-files.yaml\`
          - \`examples/lightspeed.yaml\`

          > [!CAUTION]
          > Please review the upstream changes carefully before merging.
          EOF
            )

            gh pr create \
              --title "${TITLE}" \
              --body "${BODY}" \
              --base "${{ github.ref_name }}"
          fi
