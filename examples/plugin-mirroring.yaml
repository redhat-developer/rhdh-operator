###
# This assumes you have a mirror registry reachable at registry.localhost:5000 from your host (or bastion host) and from your cluster.
# Feel free to copy this and adapt to your environment.
#
# ```
# .rhdh/scripts/mirror-plugins.sh \
#    --plugin-index oci://registry.access.redhat.com/rhdh/plugin-catalog-index:<tag> \
#    --to-registry registry.localhost:5000
#
# kubectl apply -f examples/plugin-mirroring.yaml
# ```

---
# NOTE: Refer to this manual for more details about the registries.conf format
# https://github.com/containers/image/blob/main/docs/containers-registries.conf.5.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: my-rhdh-mirror-conf
data:
  "rhdh-registries.conf": |
    # See https://github.com/containers/image/blob/main/docs/containers-registries.conf.5.md

    [[registry]]
    location = "registry.localhost:5000"
    # Omit or set 'insecure = false` for production registries
    insecure = true

    [[registry]]
    ## GA and TP plugins
    prefix = "registry.access.redhat.com/rhdh"
    location = "registry.localhost:5000/rhdh"
    # Omit or set 'insecure = false` for production registries
    insecure = true
    
    [[registry]]
    ## Some plugins might be available here
    prefix = "quay.io/rhdh"
    location = "registry.localhost:5000/rhdh"
    # Omit or set 'insecure = false` for production registries
    insecure = true

    [[registry]]
    ## RHDH community plugins
    prefix = "ghcr.io/redhat-developer/rhdh-plugin-export-overlays"
    location = "registry.localhost:5000/rhdh-plugin-export-overlays"
    # Omit or set 'insecure = false` for production registries
    insecure = true

---
apiVersion: rhdh.redhat.com/v1alpha5
kind: Backstage
metadata:
  name: my-rhdh-plugin-mirroring
spec:
  application:
    extraFiles:
      configMaps:
        - name: my-rhdh-mirror-conf
          key: rhdh-registries.conf
          mountPath: /etc/containers/registries.conf.d
          containers: [ install-dynamic-plugins ]

#      secrets:
#        # If your mirror registry requires auth, you should mount the credentials inside the init container.
#
#        # "oc create secret docker-registry" produces key ".dockerconfigjson".
#        # No per-item mountPath → file lands at extraFiles.mountPath/.dockerconfigjson
#        # i.e. /opt/app-root/src/.dockerconfigjson (working dir, always exists).
#        - name: internal-registry-auth
#          key: .dockerconfigjson
#          containers: [ install-dynamic-plugins ]

#    extraEnvs:
