apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{PROFILE_SHORT}}-operator-installer
  namespace: {{OPERATOR_NAMESPACE}}
---
# OLM v1 requires cluster-admin for installer SAs that manage cluster-scoped resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{PROFILE_SHORT}}-operator-installer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: {{PROFILE_SHORT}}-operator-installer
  namespace: {{OPERATOR_NAMESPACE}}
---
apiVersion: olm.operatorframework.io/v1
kind: ClusterExtension
metadata:
  name: {{PROFILE_SHORT}}-operator
spec:
  namespace: {{OPERATOR_NAMESPACE}}
  serviceAccount:
    name: {{PROFILE_SHORT}}-operator-installer
  source:
    sourceType: Catalog
    catalog:
      packageName: {{BUNDLE_METADATA_PACKAGE_NAME}}
      selector:
        matchLabels:
          olm.operatorframework.io/metadata.name: {{PROFILE_SHORT}}-operator
  install:
    preflight:
      crdUpgradeSafety:
        enforcement: None
