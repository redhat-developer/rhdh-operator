apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rhdh-operator

namePrefix: rhdh-

resources:
- ../../crd
- ../../rbac
- ../../manager
- namespace.yaml
- plugin-rbac

images:
- name: controller
  newName: quay.io/rhdh/rhdh-rhel9-operator
  newTag: "1.11"

patches:
- path: patches/deployment-patch.yaml
  target:
    kind: Deployment
    name: operator

generatorOptions:
  disableNameSuffixHash: true

# Base configuration

# Lightspeed flavour configuration

# Orchestrator flavour configuration

# Plugin dependencies
configMapGenerator:
- files:
  - default-config/app-config.yaml
  - default-config/db-secret.yaml
  - default-config/db-service.yaml
  - default-config/db-statefulset.yaml
  - default-config/deployment.yaml
  - default-config/dynamic-plugins.yaml
  - default-config/route.yaml
  - default-config/service.yaml
  - default-config/deployment.yaml.k8s
  - default-config/db-statefulset.yaml.k8s
  - default-config/service.yaml.k8s
  - default-config/secret-files.yaml
  name: default-config
- files:
  - default-config/flavours/lightspeed/metadata.yaml
  - default-config/flavours/lightspeed/configmap-files.yaml
  - default-config/flavours/lightspeed/deployment.yaml
  - default-config/flavours/lightspeed/dynamic-plugins.yaml
  name: flavour-lightspeed-config
- files:
  - default-config/flavours/orchestrator/metadata.yaml
  - default-config/flavours/orchestrator/dynamic-plugins.yaml
  name: flavour-orchestrator-config
- files:
  - plugin-deps/sonataflow.yaml
  - plugin-deps/argocd.yaml
  - plugin-deps/tekton.yaml
  name: plugin-deps
