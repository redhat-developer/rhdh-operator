apiVersion: apps/v1
kind: Deployment
spec:
  template:
    spec:
      initContainers:
        - name: init-rag-data
          image: 'quay.io/redhat-ai-dev/rag-content:release-1.9-lcs'
          command:
            - "sh"
            - "-c"
            - "echo 'Copying RAG data...'; cp -r /rag/vector_db/rhdh_product_docs /data/ && cp -r /rag/embeddings_model /data/ && chmod -R 777 /data/rhdh_product_docs && echo 'Copy complete.'"
          volumeMounts:
            - mountPath: /data
              name: rag-data-volume

      containers:
        # Llama Stack AI Service
        - name: llama-stack
          image: quay.io/redhat-ai-dev/llama-stack:0.1.4
          imagePullPolicy: Always
          volumeMounts:
            - mountPath: /app-root/.llama
              name: shared-storage
            - mountPath: /rag-content
              name: rag-data-volume
            - mountPath: /tmp              # Add this to make /tmp writable
              name: temp

        # Lightspeed Core Backend
        - name: lightspeed-core
          image: quay.io/lightspeed-core/lightspeed-stack:0.4.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: lcs-backend
              protocol: TCP
          volumeMounts:
            - mountPath: /tmp/data/feedback
              name: shared-storage

      volumes:
        - name: shared-storage
          emptyDir: { }
        - name: rag-data-volume
          emptyDir: { }
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
              - serviceAccountToken:
                  expirationSeconds: 3600
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
