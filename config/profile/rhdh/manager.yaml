apiVersion: v1
kind: Namespace
metadata:
  labels:
    app: rhdh-operator
  name: operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: operator
  labels:
    app: rhdh-operator
spec:
  selector:
    matchLabels:
      app: rhdh-operator
  replicas: 1
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app: rhdh-operator
        app.kubernetes.io/component: rhdh-operator
        app.kubernetes.io/managed-by: olm
    spec:
      # Required because the operator does not work without a Service Account Token
      automountServiceAccountToken: true # NOSONAR
      # Configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64
#                    - arm64
#                    - ppc64le
#                    - s390x
                - key: kubernetes.io/os
                  operator: In
                  values:
                    - linux
      securityContext:
        runAsNonRoot: true
        # (user): For common cases that do not require escalating privileges
        # it is recommended to ensure that all your Pods/Containers are restrictive.
        # More info: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        # Please uncomment the following code if your project does NOT have to work on old Kubernetes
        # versions < 1.19 or on vendors versions which do NOT support this field by default (i.e. Openshift < 4.11 ).
        # seccompProfile:
        #   type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --health-probe-bind-address=:8081
          - --metrics-bind-address=:8443
          - --metrics-secure=true
          - --leader-elect
        env:
          - name: OPERATOR_NAME
            value: rhdh-operator
          - name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          - name: RELATED_IMAGE_postgresql
            value: quay.io/fedora/postgresql-15:latest
            # value: registry.redhat.io/rhel9/postgresql-15:latest
          - name: RELATED_IMAGE_backstage
            value: quay.io/rhdh/rhdh-hub-rhel9:next
            # value: registry.redhat.io/rhdh/rhdh-hub-rhel9:1.5
        image: controller:latest
        name: manager
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - "ALL"
        ports:
          - name: health
            containerPort: 8081
          - name: metrics
            containerPort: 8443
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
            ephemeral-storage: 20Mi
          requests:
            cpu: 10m
            memory: 128Mi
        volumeMounts:
          - mountPath: /default-config
            name: default-config
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: default-config
        configMap:
          name: default-config
