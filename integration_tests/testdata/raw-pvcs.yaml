apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: myclaim1
  annotations:
    rhdh.redhat.com/mount-path: /mnt/rhdh-vol1
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 8Gi
---
