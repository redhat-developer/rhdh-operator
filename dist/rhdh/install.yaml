apiVersion: v1
data:
  argocd.yaml: |-
    ---
    apiVersion: argoproj.io/v1alpha1
    kind: AppProject
    metadata:
      name: argocd-app-project
    spec:
      destinations:
      - name: '*'
        namespace: '*'
        server: '*'
      sourceRepos:
      - '*'
  sonataflow.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-infra-ns-to-workflow-ns # hardcoded
    spec:
      podSelector: {}
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  # Allow knative events to be delivered to workflows.
                  kubernetes.io/metadata.name: knative-eventing
            - namespaceSelector:
                matchLabels:
                  # Allow auxiliary knative function for workflow (such as m2k-save-transformation)
                  kubernetes.io/metadata.name: knative-serving
            - namespaceSelector:
                matchLabels:
                  # Allow openshift serverless logic operator controller pod to access all pods in sonataflow
                  kubernetes.io/metadata.name: openshift-serverless-logic
    ---
    # NetworkPolicy to unblock incoming traffic to the namespace
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-external-communication # hardcoded
    spec:
      podSelector: {}
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  # Allow knative events to be delivered to workflows.
                  policy-group.network.openshift.io/ingress: ""
    ---
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-intra-network # hardcoded
    spec:
      # Apply this policy to all pods in the namespace
      podSelector: {}
      # Specify policy type as 'Ingress' to control incoming traffic rules
      policyTypes:
        - Ingress
      ingress:
        - from:
            # Allow ingress from any pod within the same namespace
            - podSelector: {}
    ---
    # NetworkPolicy to allow openshift-user-workload-monitoring pods to access all pods within the workflow's namespace
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-monitoring-to-sonataflow-and-workflows # hardcoded
    spec:
      # Apply this policy to all pods in the namespace
      podSelector: {}
      # Specify policy type as 'Ingress' to control incoming traffic rules
      policyTypes:
        - Ingress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  # Allow openshift-user-workload-monitoring pods to access the workflow.
                  kubernetes.io/metadata.name: openshift-user-workload-monitoring
    ---
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: create-sonataflow-database-{{backstage-name}}
    spec:
      ttlSecondsAfterFinished: 30
      activeDeadlineSeconds: 120
      template:
        spec:
          containers:
            - name: psql
              image: quay.io/fedora/postgresql-15:latest
              resources:
                limits:
                  cpu: "100m"
                  memory: "128Mi"
                requests:
                  cpu: "100m"
                  memory: "64Mi"
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
              envFrom:
                - secretRef:
                    name: backstage-psql-secret-{{backstage-name}}
              command: [ "sh", "-c" ]
              args:
                - |
                  set -e
                  DB_EXISTS=$(PGPASSWORD=${POSTGRES_PASSWORD} psql -h ${POSTGRES_HOST} -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -tAc "SELECT 1 FROM pg_database WHERE datname='backstage_plugin_orchestrator'" postgres)
                  if [ -z "$DB_EXISTS" ]; then
                    PGPASSWORD=${POSTGRES_PASSWORD} psql -h ${POSTGRES_HOST} -p ${POSTGRES_PORT} -U ${POSTGRES_USER} -c "CREATE DATABASE backstage_plugin_orchestrator;" postgres
                  fi
          restartPolicy: Never
    ---
    apiVersion: sonataflow.org/v1alpha08
    kind: SonataFlowPlatform
    metadata:
      name: sonataflow-platform
    spec:
      monitoring:
        enabled: true
      services:
        dataIndex:
          enabled: true
          persistence:
            postgresql:
              secretRef:
                name: backstage-psql-secret-{{backstage-name}}
                userKey: POSTGRES_USER
                passwordKey: POSTGRES_PASSWORD
              serviceRef:
                name: backstage-psql-{{backstage-name}}
                namespace: {{backstage-ns}}
                databaseName: backstage_plugin_orchestrator
        jobService:
          enabled: true
          persistence:
            postgresql:
              secretRef:
                name: backstage-psql-secret-{{backstage-name}}
                userKey: POSTGRES_USER
                passwordKey: POSTGRES_PASSWORD
              serviceRef:
                name: backstage-psql-{{backstage-name}}
                namespace: {{backstage-ns}}
                databaseName: backstage_plugin_orchestrator
  tekton.yaml: |-
    ---
    apiVersion: tekton.dev/v1
    kind: Task
    metadata:
      name: git-cli
      namespace: {{backstage-ns}}
      labels:
        app.kubernetes.io/version: "0.4"
      annotations:
        tekton.dev/pipelines.minVersion: "0.21.0"
        tekton.dev/categories: Git
        tekton.dev/tags: git
        tekton.dev/displayName: "git cli"
        tekton.dev/platforms: "linux/amd64,linux/arm64,linux/s390x,linux/ppc64le"
    spec:
      description: >-
        This task can be used to perform git operations.

        Git command that needs to be run can be passed as a script to
        the task. This task needs authentication to git in order to push
        after the git operation.

      workspaces:
        - name: source
          description: A workspace that contains the fetched git repository.

        - name: input
          optional: true
          description: |
            An optional workspace that contains the files that need to be added to git. You can
            access the workspace from your script using `$(workspaces.input.path)`, for instance:

            cp $(workspaces.input.path)/file_that_i_want .
            git add file_that_i_want
            # etc

        - name: ssh-directory
          optional: true
          description: |
            A .ssh directory with private key, known_hosts, config, etc. Copied to
            the user's home before git commands are executed. Used to authenticate
            with the git remote when performing the clone. Binding a Secret to this
            Workspace is strongly recommended over other volume types.

        - name: basic-auth
          optional: true
          description: |
            A Workspace containing a .gitconfig and .git-credentials file. These
            will be copied to the user's home before any git commands are run. Any
            other files in this Workspace are ignored. It is strongly recommended
            to use ssh-directory over basic-auth whenever possible and to bind a
            Secret to this Workspace over other volume types.
      params:
        - name: BASE_IMAGE
          description: |
            The base image for the task.
          type: string
          # TODO: Deprecate use of root image.
          default: cgr.dev/chainguard/git:root-2.39@sha256:7759f87050dd8bacabe61354d75ccd7f864d6b6f8ec42697db7159eccd491139

        - name: GIT_USER_NAME
          type: string
          description: |
            Git user name for performing git operation.
          default: ""

        - name: GIT_USER_EMAIL
          type: string
          description: |
            Git user email for performing git operation.
          default: ""

        - name: GIT_SCRIPT
          description: The git script to run.
          type: string
          default: |
            git help

        - name: USER_HOME
          description: |
            Absolute path to the user's home directory. Set this explicitly if you are running the image as a non-root user or have overridden
            the gitInitImage param with an image containing custom user configuration.
          type: string
          default: "/root"

        - name: VERBOSE
          description: Log the commands that are executed during `git-clone`'s operation.
          type: string
          default: "true"

      results:
        - name: commit
          description: The precise commit SHA after the git operation.

      steps:
        - name: git
          image: $(params.BASE_IMAGE)
          workingDir: $(workspaces.source.path)
          env:
          - name: HOME
            value: $(params.USER_HOME)
          - name: PARAM_VERBOSE
            value: $(params.VERBOSE)
          - name: PARAM_USER_HOME
            value: $(params.USER_HOME)
          - name: WORKSPACE_OUTPUT_PATH
            value: $(workspaces.output.path)
          - name: WORKSPACE_SSH_DIRECTORY_BOUND
            value: $(workspaces.ssh-directory.bound)
          - name: WORKSPACE_SSH_DIRECTORY_PATH
            value: $(workspaces.ssh-directory.path)
          - name: WORKSPACE_BASIC_AUTH_DIRECTORY_BOUND
            value: $(workspaces.basic-auth.bound)
          - name: WORKSPACE_BASIC_AUTH_DIRECTORY_PATH
            value: $(workspaces.basic-auth.path)
          script: |
            #!/usr/bin/env sh
            set -eu

            if [ "${PARAM_VERBOSE}" = "true" ] ; then
              set -x
            fi

            if [ "${WORKSPACE_BASIC_AUTH_DIRECTORY_BOUND}" = "true" ] ; then
              cp "${WORKSPACE_BASIC_AUTH_DIRECTORY_PATH}/.git-credentials" "${PARAM_USER_HOME}/.git-credentials"
              cp "${WORKSPACE_BASIC_AUTH_DIRECTORY_PATH}/.gitconfig" "${PARAM_USER_HOME}/.gitconfig"
              chmod 400 "${PARAM_USER_HOME}/.git-credentials"
              chmod 400 "${PARAM_USER_HOME}/.gitconfig"
            fi

            if [ "${WORKSPACE_SSH_DIRECTORY_BOUND}" = "true" ] ; then
              cp -R "${WORKSPACE_SSH_DIRECTORY_PATH}" "${PARAM_USER_HOME}"/.ssh
              chmod 700 "${PARAM_USER_HOME}"/.ssh
              chmod -R 400 "${PARAM_USER_HOME}"/.ssh/*
            fi

            # Setting up the config for the git.
            git config --global user.email "$(params.GIT_USER_EMAIL)"
            git config --global user.name "$(params.GIT_USER_NAME)"

            eval '$(params.GIT_SCRIPT)'

            RESULT_SHA="$(git rev-parse HEAD | tr -d '\n')"
            EXIT_CODE="$?"
            if [ "$EXIT_CODE" != 0 ]
            then
              exit $EXIT_CODE
            fi
            # Make sure we don't add a trailing newline to the result!
            printf "%s" "$RESULT_SHA" > "$(results.commit.path)"
          # Patch to apply on OpenShift
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
    ---
    apiVersion: tekton.dev/v1
    kind: Task
    metadata:
      name: flattener
      namespace: {{backstage-ns}}
    spec:
      workspaces:
        - name: workflow-source
      params:
        - name: workflowId
          description: The workflow ID from the repository
          type: string
        - name: convertToFlat
          description: Whether conversion to flat layout is needed or it's already flattened
          type: string
          default: "true"
      steps:
        - name: flatten
          image: registry.access.redhat.com/ubi9-minimal
          workingDir: $(workspaces.workflow-source.path)
          script: |
            ROOT=/workspace/workflow
            TARGET=flat
            mkdir -p flat

            if [ -d "workflow/$(params.workflowId)" ]; then
              cp -r workflow/$(params.workflowId)/src/main/resources flat/$(params.workflowId)
              cp workflow/$(params.workflowId)/LICENSE flat/$(params.workflowId)
            else
              cp -r workflow/src/main/resources flat/$(params.workflowId)
              cp workflow/LICENSE flat/$(params.workflowId)
            fi

            if [ "$(params.convertToFlat)" == "false" ]; then
              rm -rf workflow/src/main/resources
              mv workflow/src flat/$(params.workflowId)/
            fi

            ls flat/$(params.workflowId)

            curl -L https://raw.githubusercontent.com/rhdhorchestrator/serverless-workflows/main/pipeline/workflow-builder.Dockerfile -o flat/workflow-builder.Dockerfile
    ---
    apiVersion: tekton.dev/v1
    kind: Task
    metadata:
      name: build-manifests
      namespace: {{backstage-ns}}
    spec:
      workspaces:
        - name: workflow-source
      params:
        - name: workflowId
          description: The workflow ID from the repository
          type: string
      steps:
        - name: build-manifests
          image: registry.access.redhat.com/ubi9-minimal
          workingDir: $(workspaces.workflow-source.path)/flat/$(params.workflowId)
          script: |
            microdnf install -y tar gzip
            KN_CLI_URL="https://developers.redhat.com/content-gateway/file/pub/cgw/serverless-logic/1.37.2/kn-workflow-linux-amd64.tar.gz"
            curl -L "$KN_CLI_URL" | tar -xz --no-same-owner && chmod +x kn-workflow-linux-amd64 && mv kn-workflow-linux-amd64 kn-workflow
            ./kn-workflow gen-manifest --namespace ""
    ---
    apiVersion: tekton.dev/v1
    kind: Task
    metadata:
      name: build-gitops
      namespace: {{backstage-ns}}
    spec:
      workspaces:
        - name: workflow-source
        - name: workflow-gitops
      params:
        - name: workflowId
          description: The workflow ID from the repository
          type: string
        - name: imageTag
          type: string
      steps:
        - name: build-gitops
          image: registry.access.redhat.com/ubi9-minimal
          workingDir: $(workspaces.workflow-gitops.path)/workflow-gitops
          script: |
            cp $(workspaces.workflow-source.path)/flat/$(params.workflowId)/manifests/* kustomize/base
            microdnf install -y findutils && microdnf clean all
            cd kustomize
            ./updater.sh $(params.workflowId) $(params.imageTag)
    ---
    apiVersion: tekton.dev/v1
    kind: Pipeline
    metadata:
      name: workflow-deployment
      namespace: {{backstage-ns}}
    spec:
      description: |
        This pipeline clones a git repo, builds a Docker image with Kaniko and
        pushes it to a registry
      params:
        - name: gitUrl
          description: The SSH URL of the repository to clone
          type: string
        - name: gitOpsUrl
          description: The SSH URL of the config repository for pushing the changes
          type: string
        - name: workflowId
          description: The workflow ID from the repository
          type: string
        - name: convertToFlat
          description: Whether conversion to flat layout is needed or it's already flattened
          type: string
          default: "true"
        - name: quayOrgName
          description: The Quay Organization Name of the published workflow
          type: string
        - name: quayRepoName
          description: The Quay Repository Name of the published workflow
          type: string
      workspaces:
        - name: workflow-source
        - name: workflow-gitops
        - name: ssh-creds
        - name: docker-credentials
      tasks:
        - name: fetch-workflow
          taskRef:
            name: git-cli
          workspaces:
            - name: source
              workspace: workflow-source
            - name: ssh-directory
              workspace: ssh-creds
          params:
            - name: GIT_USER_NAME
              value: The Orchestrator Tekton Pipeline
            - name: GIT_USER_EMAIL
              value: rhdhorchestrator@redhat.com
            - name: USER_HOME
              value: /home/git
            - name: GIT_SCRIPT
              value: |
                eval "$(ssh-agent -s)"
                ssh-add "${PARAM_USER_HOME}"/.ssh/id_rsa
                GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=${PARAM_USER_HOME}/.ssh/known_hosts" git clone $(params.gitUrl) workflow
                cd workflow
        - name: fetch-workflow-gitops
          taskRef:
            name: git-cli
          workspaces:
            - name: source
              workspace: workflow-gitops
            - name: ssh-directory
              workspace: ssh-creds
          params:
            - name: GIT_USER_NAME
              value: The Orchestrator Tekton Pipeline
            - name: GIT_USER_EMAIL
              value: rhdhorchestrator@redhat.com
            - name: USER_HOME
              value: /home/git
            - name: GIT_SCRIPT
              value: |
                eval "$(ssh-agent -s)"
                ssh-add "${PARAM_USER_HOME}"/.ssh/id_rsa
                GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=${PARAM_USER_HOME}/.ssh/known_hosts" git clone $(params.gitOpsUrl) workflow-gitops
        - name: flatten-workflow
          runAfter: ["fetch-workflow"]
          taskRef:
            name: flattener
          workspaces:
            - name: workflow-source
              workspace: workflow-source
          params:
            - name: workflowId
              value: $(params.workflowId)
            - name: convertToFlat
              value: $(params.convertToFlat)
        - name: build-manifests
          runAfter: ["flatten-workflow"]
          taskRef:
            name: build-manifests
          workspaces:
            - name: workflow-source
              workspace: workflow-source
          params:
            - name: workflowId
              value: $(params.workflowId)
        - name: build-gitops
          runAfter: ["build-manifests", "fetch-workflow-gitops"]
          taskRef:
            name: build-gitops
          workspaces:
            - name: workflow-source
              workspace: workflow-source
            - name: workflow-gitops
              workspace: workflow-gitops
          params:
            - name: workflowId
              value: $(params.workflowId)
            - name: imageTag
              value: $(tasks.fetch-workflow.results.commit)
        - name: build-and-push-image
          runAfter: ["flatten-workflow"]
          taskRef:
            resolver: cluster
            params:
            - name: kind
              value: task
            - name: name
              value: buildah
            - name: namespace
              value: openshift-pipelines
          workspaces:
            - name: source
              workspace: workflow-source
            - name: dockerconfig
              workspace: docker-credentials
          params:
            - name: IMAGE
              value: quay.io/$(params.quayOrgName)/$(params.quayRepoName):$(tasks.fetch-workflow.results.commit)
            - name: DOCKERFILE
              value: flat/workflow-builder.Dockerfile
            - name: CONTEXT
              value: flat/$(params.workflowId)
            - name: BUILD_EXTRA_ARGS
              value: '--authfile=/workspace/dockerconfig/.dockerconfigjson --ulimit nofile=4096:4096 --build-arg WF_RESOURCES=. '
        - name: push-workflow-gitops
          runAfter: ["build-gitops", "build-and-push-image"]
          taskRef:
            name: git-cli
          workspaces:
            - name: source
              workspace: workflow-gitops
            - name: ssh-directory
              workspace: ssh-creds
          params:
            - name: GIT_USER_NAME
              value: The Orchestrator Tekton Pipeline
            - name: GIT_USER_EMAIL
              value: rhdhorchestrator@redhat.com
            - name: USER_HOME
              value: /home/git
            - name: GIT_SCRIPT
              value: |
                WORKFLOW_COMMIT=$(tasks.fetch-workflow.results.commit)

                eval "$(ssh-agent -s)"
                ssh-add "${PARAM_USER_HOME}"/.ssh/id_rsa

                cd workflow-gitops
                git add .
                git diff
                # TODO: create PR
                git commit -m "Deployment for workflow commit $WORKFLOW_COMMIT from $(params.gitUrl)"
                # TODO: parametrize branch
                GIT_SSH_COMMAND="ssh -o UserKnownHostsFile=${PARAM_USER_HOME}/.ssh/known_hosts" git push origin main
kind: ConfigMap
metadata:
  name: rhdh-plugin-deps
  namespace: rhdh-operator
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: metrics
    app.kubernetes.io/created-by: backstage-operator
    app.kubernetes.io/instance: controller-manager-metrics-service
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: service
    app.kubernetes.io/part-of: backstage-operator
    control-plane: controller-manager
  name: rhdh-controller-manager-metrics-service
  namespace: rhdh-operator
spec:
  ports:
  - name: metrics
    port: 8443
    protocol: TCP
    targetPort: metrics
  selector:
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: rhdh-operator
    app.kubernetes.io/component: backstage-controller
    app.kubernetes.io/part-of: rhdh
    control-plane: controller-manager
  name: rhdh-operator
  namespace: rhdh-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhdh-operator
  strategy:
    type: RollingUpdate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app: rhdh-operator
        app.kubernetes.io/component: rhdh-operator
        control-plane: controller-manager
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
      automountServiceAccountToken: true
      containers:
      - args:
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8443
        - --metrics-secure=true
        - --leader-elect
        command:
        - /manager
        env:
        - name: OPERATOR_NAME
          value: rhdh-operator
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: RELATED_IMAGE_postgresql
          value: quay.io/fedora/postgresql-15:latest
        - name: RELATED_IMAGE_backstage
          value: quay.io/rhdh-community/rhdh:next
        image: quay.io/rhdh/rhdh-rhel9-operator:1.10
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8081
          name: health
        - containerPort: 8443
          name: metrics
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            ephemeral-storage: 20Mi
            memory: 1Gi
          requests:
            cpu: 10m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /default-config/flavours/lightspeed
          name: flavour-lightspeed-config
        - mountPath: /default-config/flavours/orchestrator
          name: flavour-orchestrator-config
        - mountPath: /default-config
          name: default-config
        - mountPath: /plugin-deps
          name: plugin-deps
      securityContext:
        runAsNonRoot: true
      serviceAccountName: rhdh-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - configMap:
          name: rhdh-flavour-lightspeed-config
        name: flavour-lightspeed-config
      - configMap:
          name: rhdh-flavour-orchestrator-config
        name: flavour-orchestrator-config
      - configMap:
          name: rhdh-default-config
        name: default-config
      - configMap:
          name: rhdh-plugin-deps
          optional: true
        name: plugin-deps
