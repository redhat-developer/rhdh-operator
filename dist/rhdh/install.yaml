apiVersion: v1
data:
  app-config.yaml: "apiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: default-appconfig
    # placeholder for <bs>-default-appconfig\ndata:\n  default.app-config.yaml: |\n
    \   ###########################################################################################################\n
    \   # /!\\ WARNING\n    #\n    # This is the default app-config file created and
    managed by the Operator for your CR.\n    # Do NOT edit this manually in the Cluster,
    as your changes will be overridden by the Operator upon the\n    # next reconciliation.\n
    \   # If you want to customize the application configuration, you should create
    your own app-config ConfigMap\n    # and reference it in your CR.\n    # See https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.4/html/configuring/provisioning-and-using-your-custom-configuration#provisioning-your-custom-configuration\n
    \   # for more details.\n    ###########################################################################################################\n
    \   auth:\n      environment: development\n      providers:  \n        {}\n"
  db-secret.yaml: |-
    apiVersion: v1
    kind: Secret
    metadata:
      name: postgres-secrets # will be replaced
    type: Opaque
    #stringData:
    #  POSTGRES_PASSWORD:
    #  POSTGRES_PORT: "5432"
    #  POSTGRES_USER: postgres
    #  POSTGRESQL_ADMIN_PASSWORD: admin123
    #  POSTGRES_HOST: bs1-db-service    #placeholder <crname>-db-service
  db-service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: backstage-psql # placeholder for 'backstage-psql-<cr-name>' .NOTE: For the time it is static and linked to Secret-> postgres-secrets -> OSTGRES_HOST
    spec:
      selector:
        rhdh.redhat.com/app:  backstage-psql-cr1 # placeholder for 'backstage-psql-<cr-name>'
      clusterIP: None
      ports:
        - port: 5432
  db-statefulset.yaml: |-
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: backstage-psql-cr1 # placeholder for 'backstage-psql-<cr-name>'
    spec:
      podManagementPolicy: OrderedReady
      # replicas: 1 # Intentionally omitted to allow HPA or custom scaling control.
      selector:
        matchLabels:
          rhdh.redhat.com/app: backstage-psql-cr1 # placeholder for 'backstage-psql-<cr-name>'
      serviceName: backstage-psql-cr1-hl # placeholder for 'backstage-psql-<cr-name>-hl'
      template:
        metadata:
          labels:
            rhdh.redhat.com/app: backstage-psql-cr1 # placeholder for 'backstage-psql-<cr-name>'
        spec:
          # fsGroup does not work for Openshift
          # AKS/EKS does not work w/o it
          #securityContext:
          #  fsGroup: 26
          automountServiceAccountToken: false
          ## https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/
          ## The optional .spec.persistentVolumeClaimRetentionPolicy field controls if and how PVCs are deleted during the lifecycle of a StatefulSet.
          ## You must enable the StatefulSetAutoDeletePVC feature gate on the API server and the controller manager to use this field.
    #      persistentVolumeClaimRetentionPolicy:
    #        whenDeleted: Retain
    #        whenScaled: Retain
          containers:
            - env:
                - name: POSTGRESQL_PORT_NUMBER
                  value: "5432"
                - name: POSTGRESQL_VOLUME_DIR
                  value: /var/lib/pgsql/data
                - name: PGDATA
                  value: /var/lib/pgsql/data/userdata
              image: quay.io/fedora/postgresql-15:latest # will be replaced with the actual image
              imagePullPolicy: IfNotPresent
              securityContext:
                # runAsUser:26 does not work for Openshift but looks work for AKS/EKS
                # runAsUser: 26
                runAsGroup: 0
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
              livenessProbe:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - exec pg_isready -U ${POSTGRES_USER} -h 127.0.0.1 -p 5432
                failureThreshold: 6
                initialDelaySeconds: 30
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 5
              name: postgresql
              ports:
                - containerPort: 5432
                  name: tcp-postgresql
                  protocol: TCP
              readinessProbe:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - -e
                    - |
                      exec pg_isready -U ${POSTGRES_USER} -h 127.0.0.1 -p 5432
                failureThreshold: 6
                initialDelaySeconds: 5
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 5
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 250m
                  memory: 1024Mi
                  ephemeral-storage: 20Mi
              volumeMounts:
                - mountPath: /dev/shm
                  name: dshm
                - mountPath: /var/lib/pgsql/data
                  name: data
          restartPolicy: Always
          serviceAccountName: default
          volumes:
            - emptyDir:
                medium: Memory
              name: dshm
      updateStrategy:
        rollingUpdate:
          partition: 0
        type: RollingUpdate
      volumeClaimTemplates:
        - apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
  db-statefulset.yaml.k8s: |-
    # if securityContext not present in AKS/EKS, the error is like this:
    # Error: EACCES: permission denied, open '/dynamic-plugins-root/backstage-plugin-scaffolder-backend-module-github-dynamic-0.2.2.tgz'
    # fsGroup doesn not work for Openshift
    spec:
      template:
        spec:
          securityContext:
            # any group id
            fsGroup: 1001
  deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backstage # placeholder for 'backstage-<cr-name>'
    spec:
      # replicas: 1 # Intentionally omitted to allow HPA or custom scaling control.
      selector:
        matchLabels:
          rhdh.redhat.com/app: # placeholder for 'backstage-<cr-name>'
      # important: keep strategy type (even if default) to allow patching it
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
      template:
        metadata:
          labels:
            rhdh.redhat.com/app: # placeholder for 'backstage-<cr-name>'
        spec:
          automountServiceAccountToken: false
          # if securityContext not present in AKS/EKS, the error is like this:
          #Error: EACCES: permission denied, open '/dynamic-plugins-root/backstage-plugin-scaffolder-backend-module-github-dynamic-0.2.2.tgz'
          # fsGroup doesn not work for Openshift
          #securityContext:
          #   fsGroup: 1001
          volumes:
            - ephemeral:
                volumeClaimTemplate:
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: 2Gi
              name: dynamic-plugins-root
            # TODO Configuring dynamic plugins registry auth this way is deprecated and supported only for documentation backward compatibility.
            - name: dynamic-plugins-registry-auth
              secret:
                defaultMode: 416
                optional: true
                secretName: dynamic-plugins-registry-auth
            - name: extensions-catalog
              emptyDir: {}
            - emptyDir: {}
              name: npmcacache
            - name: temp
              emptyDir: {}
          initContainers:
            - name: install-dynamic-plugins
              command:
                - ./install-dynamic-plugins.sh
                - /dynamic-plugins-root
              # image will be replaced by the value of the `RELATED_IMAGE_backstage` env var, if set
              image: quay.io/rhdh-community/rhdh:next
              imagePullPolicy: IfNotPresent
              securityContext:
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
                capabilities:
                  drop:
                    - ALL
              env:
                - name: NPM_CONFIG_USERCONFIG
                  value: /opt/app-root/src/.npmrc.dynamic-plugins/.npmrc
                - name: MAX_ENTRY_SIZE
                  value: "40000000"
                # CATALOG_INDEX_IMAGE will be replaced by the value of the `RELATED_IMAGE_catalog_index` env var, if set
                - name: CATALOG_INDEX_IMAGE
                  value: "quay.io/rhdh/plugin-catalog-index:1.9"
                - name: CATALOG_ENTITIES_EXTRACT_DIR
                  value: '/extensions'
              volumeMounts:
                - mountPath: /dynamic-plugins-root
                  name: dynamic-plugins-root
                - name: extensions-catalog
                  mountPath: /extensions
                # TODO Configuring dynamic plugins registry auth this way is deprecated and supported only for documentation backward compatibility.
                - mountPath: /opt/app-root/src/.config/containers
                  name: dynamic-plugins-registry-auth
                  readOnly: true
                - mountPath: /opt/app-root/src/.npm/_cacache
                  name: npmcacache
                - mountPath: /tmp
                  name: temp
              workingDir: /opt/app-root/src
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 2.5Gi
                  ephemeral-storage: 5Gi
          containers:
            - name: backstage-backend
              # image will be replaced by the value of the `RELATED_IMAGE_backstage` env var, if set
              image: quay.io/rhdh-community/rhdh:next
              imagePullPolicy: IfNotPresent
              args:
                - "--config"
                - "dynamic-plugins-root/app-config.dynamic-plugins.yaml"
              securityContext:
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
              startupProbe:
                # This gives enough time upon container startup before the liveness and readiness probes are triggered.
                # Giving (120s = initialDelaySeconds + failureThreshold * periodSeconds) to account for the worst case scenario.
                httpGet:
                  path: /.backstage/health/v1/liveness
                  port: backend
                  scheme: HTTP
                initialDelaySeconds: 30
                timeoutSeconds: 4
                periodSeconds: 20
                successThreshold: 1
                failureThreshold: 3
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /.backstage/health/v1/readiness
                  port: backend
                  scheme: HTTP
                # Both liveness and readiness probes won't be triggered until the startup probe is successful.
                # The startup probe is already configured to give enough time for the application to be started.
                # So removing the additional delay here allows the readiness probe to be checked right away after the startup probe,
                # which helps make the application available faster to the end-user.
                #initialDelaySeconds: 30
                periodSeconds: 10
                successThreshold: 2
                timeoutSeconds: 4
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /.backstage/health/v1/liveness
                  port: backend
                  scheme: HTTP
                # Both liveness and readiness probes won't be triggered until the startup probe is successful.
                # The startup probe is already configured to give enough time for the application to be started.
                # So removing the additional delay here allows the readiness probe to be checked right away after the startup probe,
                # which helps make the application available faster to the end-user.
                #initialDelaySeconds: 60
                periodSeconds: 10
                successThreshold: 1
                timeoutSeconds: 4
              ports:
                - name: backend
                  containerPort: 7007
              env:
                - name: APP_CONFIG_backend_listen_port
                  value: "7007"
              volumeMounts:
                - mountPath: /opt/app-root/src/dynamic-plugins-root
                  name: dynamic-plugins-root
                - name: extensions-catalog
                  mountPath: /extensions
                - mountPath: /tmp
                  name: temp
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 2.5Gi
                  ephemeral-storage: 5Gi
              workingDir: /opt/app-root/src
  deployment.yaml.k8s: |-
    # if securityContext not present in AKS/EKS, the error is like this:
    # Error: EACCES: permission denied, open '/dynamic-plugins-root/backstage-plugin-scaffolder-backend-module-github-dynamic-0.2.2.tgz'
    # fsGroup doesn not work for Openshift
    spec:
      template:
        spec:
          securityContext:
            # any group id
            fsGroup: 1001
  dynamic-plugins.yaml: |
    #apiVersion: v1
    #kind: ConfigMap
    #metadata:
    #  name: default-dynamic-plugins #  must be the same as (deployment.yaml).spec.template.spec.volumes.name.dynamic-plugins-conf.configMap.name
    #data:
    #  "dynamic-plugins.yaml": |
    #    ###########################################################################################################
    #    # /!\ WARNING
    #    #
    #    # This is the default dynamic plugins configuration file created and managed by the Operator for your CR.
    #    # Do NOT edit this manually in the Cluster, as your changes will be overridden by the Operator upon the
    #    # next reconciliation.
    #    # If you want to customize the dynamic plugins, you should create your own dynamic-plugins ConfigMap
    #    # and reference it in your CR.
    #    # See https://docs.redhat.com/en/documentation/red_hat_developer_hub/1.4/html/installing_and_viewing_plugins_in_red_hat_developer_hub/rhdh-installing-rhdh-plugins_title-plugins-rhdh-about#proc-config-dynamic-plugins-rhdh-operator_rhdh-installing-rhdh-plugins
    #    # for more details or https://github.com/redhat-developer/rhdh-operator/blob/main/examples/rhdh-cr.yaml
    #    # for an example.
    #    ###########################################################################################################
    #    includes:
    #      - dynamic-plugins.default.yaml
    #    plugins: []
    #---
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: default-dynamic-plugins
    data:
      dynamic-plugins.yaml: |
        includes:
          - dynamic-plugins.default.yaml
  route.yaml: |-
    apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: route # placeholder for 'backstage-<cr-name>'
    spec:
      port:
        targetPort: http-backend
      path: /
      tls:
        insecureEdgeTerminationPolicy: Redirect
        termination: edge
      to:
        kind: Service
        name:  # placeholder for 'backstage-<cr-name>'
  secret-files.yaml: |+
    apiVersion: v1
    kind: Secret
    metadata:
      name: dynamic-plugins-npmrc
      annotations:
        rhdh.redhat.com/mount-path: /opt/app-root/src/.npmrc.dynamic-plugins
        rhdh.redhat.com/containers: install-dynamic-plugins
    type: Opaque
    stringData:
      .npmrc: |
        @redhat:registry=https://npm.registry.redhat.com
    #---
    # Placeholder for image registry ayth configuration for OCI dynamic plugins
    #apiVersion: v1
    #kind: Secret
    #metadata:
    #  name: dynamic-plugins-registry-auth
    #  annotations:
    #    rhdh.redhat.com/mount-path: /opt/app-root/src/.config/containers
    #    rhdh.redhat.com/containers: install-dynamic-plugins
    #type: Opaque


  service.yaml: |-
    apiVersion: v1
    kind: Service
    metadata:
      name: backstage # placeholder for 'backstage-<cr-name>'
    spec:
      type: ClusterIP
      selector:
        rhdh.redhat.com/app:  # placeholder for 'backstage-<cr-name>'
      ports:
        - name: http-backend
          port: 80
          targetPort: backend
        - name: http-metrics
          protocol: TCP
          port: 9464
          targetPort: 9464
  service.yaml.k8s: |
    spec:
      type: NodePort
kind: ConfigMap
metadata:
  name: rhdh-default-config
  namespace: rhdh-operator
